train_dataloader_params:
  viperx_right_arm:
    batch_size: 8
    num_workers: 4
  scale_bimanual:
    batch_size: 32     # Larger batch size for the larger dataset
    num_workers: 10
  
valid_dataloader_params:
  viperx_right_arm:
    batch_size: 8
    num_workers: 4
  scale_bimanual:
    batch_size: 32
    num_workers: 10

