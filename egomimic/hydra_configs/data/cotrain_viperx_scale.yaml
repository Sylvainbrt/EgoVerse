train_dataloader_params:
  viperx_right_arm:
    batch_size: 8
    num_workers: 4
  scale_bimanual:
    batch_size: 16
    num_workers: 16
    persistent_workers: true
    prefetch_factor: 4
    pin_memory: true
  
valid_dataloader_params:
  viperx_right_arm:
    batch_size: 8
    num_workers: 4
  scale_bimanual:
    batch_size: 16
    num_workers: 16
    persistent_workers: true
    prefetch_factor: 4
    pin_memory: true
