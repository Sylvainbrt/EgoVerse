_target_: egomimic.pl_utils.pl_data_utils.MultiDataModuleWrapper

train_datasets:
  # 1. Local LeRobot Format
  viperx_right_arm:
    _target_: egomimic.rldb.utils.FolderRLDBDataset
    folder_path: /data/sybeuret/remote_data_lerobot/egoverse_data
    embodiment: viperx_right_arm
    mode: train
    camera_keys:
      - observation.images.front_img_1
      - observation.images.right_wrist_img
    state_keys:
      - observation.state
    resolver:
      key_map:
        observation.images.front_img_1: front_img_1
        observation.images.right_wrist_img: right_wrist_img
        actions.joints_act: actions_joints
        observation.state: joint_positions

  # 2. Remote Zarr Format (AWS/S3)
  scale_bimanual:
    _target_: egomimic.rldb.zarr.zarr_dataset_multi.MultiDataset._from_resolver
    mode: train
    resolver:
      _target_: egomimic.rldb.zarr.zarr_dataset_multi.S3EpisodeResolver
      bucket_name: "rldb"
      folder_path: "/data/sybeuret/scale_zarr_cache"
      max_episodes: 50
      key_map:
        front_img_1:
          zarr_key: "images.front_1"
        right.action_ee_pose:
          zarr_key: "right.obs_ee_pose"
          horizon: 30
        left.action_ee_pose:
          zarr_key: "left.obs_ee_pose"
          horizon: 30
        right.obs_ee_pose:
          zarr_key: "right.obs_ee_pose"
        left.obs_ee_pose:
          zarr_key: "left.obs_ee_pose"
        obs_head_pose:
          zarr_key: "obs_head_pose"
      transform_list:
        _target_: egomimic.rldb.embodiment.human._build_aria_bimanual_transform_list
        actions_key: actions_cartesian
        obs_key: state_ee_pose
        chunk_length: 100
        stride: 1
    filters:
      robot_name: "scale_bimanual"

valid_datasets:
  # 1. Local LeRobot Format
  viperx_right_arm:
    _target_: egomimic.rldb.utils.FolderRLDBDataset
    folder_path: /data/sybeuret/remote_data_lerobot/egoverse_data
