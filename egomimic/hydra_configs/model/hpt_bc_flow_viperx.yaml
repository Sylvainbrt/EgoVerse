_target_: egomimic.pl_utils.pl_model.ModelWrapper

robomimic_model:
  _target_: egomimic.algo.hpt.HPT
  data_schematic: _${data.dataset.data_schematic}
  diffusion: true
  6dof: false
  ac_keys:
    viperx_right_arm: actions_joints

  trunk:
    embed_dim: 256
    num_blocks: 16
    num_heads: 8
    token_postprocessing: action_token
    observation_horizon: 1
    action_horizon: 64
    no_trunk: false
    use_domain_embedding: true
    drop_path: 0.1
    weight_init_style: pytorch

  multitask: false
  pretrained: false
  pretrained_checkpoint: ''
  reverse_kl_samples: 8
  domains:
    - viperx_right_arm

  shared_obs_keys:
    - front_img_1

  shared_stem_specs:
    front_img_1:
      _target_: egomimic.models.hpt_nets.MLPPolicyStem
      input_dim: 256
      output_dim: 256
      widths:
        - 256
      specs:
        random_horizon_masking: false
        cross_attn:
          crossattn_latent: 16
          crossattn_heads: 8
          crossattn_dim_head: 64
          crossattn_modality_dropout: 0.1
          modality_embed_dim: 256

  stem_specs:
    viperx_right_arm:
      right_wrist_img:
        _target_: egomimic.models.hpt_nets.MLPPolicyStem
        input_dim: 256
        output_dim: 256
        widths:
          - 256
        specs:
          random_horizon_masking: false
          cross_attn:
            crossattn_latent: 16
            crossattn_heads: 8
            crossattn_dim_head: 64
            crossattn_modality_dropout: 0.1
            modality_embed_dim: 256
      joint_positions:
        _target_: egomimic.models.hpt_nets.MLPPolicyStem
        input_dim: 7        # adjust to your ViperX joint count
        output_dim: 256
        widths:
          - 256
        specs:
          random_horizon_masking: false
          cross_attn:
            crossattn_latent: 16
            crossattn_heads: 8
            crossattn_dim_head: 64
            crossattn_modality_dropout: 0.1
            modality_embed_dim: 256

  head_specs:
    viperx_right_arm:
      _target_: egomimic.models.fm_policy.FMPolicy
      action_horizon: 64
      num_inference_steps: 50
      pooling: null
      time_dist: beta
      infer_ac_dims:
        viperx_right_arm: 7    # adjust to your action dimension
      model:
        _target_: egomimic.models.denoising_nets.CrossTransformer
        nblocks: 6
        cond_dim: 256
        hidden_dim: 128
        act_dim: 7             # adjust to your action dimension
        act_seq: 64
        n_heads: 4
        dropout: 0.1
        mlp_layers: 4
        mlp_ratio: 4

  encoder_specs:
    front_img_1:
      _target_: egomimic.models.hpt_nets.ResNet
      output_dim: 256
    right_wrist_img:
      _target_: egomimic.models.hpt_nets.ResNet
      output_dim: 256

  train_image_augs:
    _target_: torchvision.transforms.Compose
    transforms:
      - _target_: torchvision.transforms.ColorJitter
        brightness: 0.1
        contrast: 0.1
        saturation: 0.1
        hue: 0.05
      - _target_: torchvision.transforms.Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]

  eval_image_augs:
    _target_: torchvision.transforms.Compose
    transforms:
      - _target_: torchvision.transforms.Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 0.0001
  weight_decay: 0.0001

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  _partial_: true
  T_max: 1400
  eta_min: 1.0e-05