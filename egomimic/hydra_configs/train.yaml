defaults:
  - model: act
  - paths: default
  - trainer: ddp
  - debug: null
  - logger: wandb
  - override hydra/launcher: submitit
  - _self_

name: test
description: test
ckpt_path: null
train: true
eval: false

hydra:
  run:
    # Dir should be experiment_name/description_{timestamp}
    dir: ./logs/${name}/${description}_${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ./logs/${name}/${description}_${now:%Y-%m-%d_%H-%M-%S}

launch_params:
  gpus_per_node: 1
  nodes: 1

data:
  _target_: egomimic.pl_utils.pl_data_utils.RLDBModule
  dataset:
    _target_: rldb.utils.RLDBDataset
    # parquet_path: /coc/flash9/skareer6/Projects/RLDB/rldb/export/oboo_robot
    repo_id: "rpuns/eve_laundry_rl2"
    root: "/coc/cedarp-dxu345-0/datasets/RLDB/robomimic_eve_laundry_debug/lerobot_debug"
    local_files_only: true

  dataloader_kwargs:
    batch_size: 32
    num_workers: 10

data_schematic: # Dynamically fill in these shapes from the dataset
  _target_: rldb.utils.DataSchematic
  schematic_dict:
    front_img_1:
      key_type: camera_keys
      lerobot_key: observations.images.front_img_1
    right_wrist_img:
      key_type: camera_keys
      lerobot_key: observations.images.right_wrist_img
    left_wrist_img:
      key_type: camera_keys
      lerobot_key: observations.images.left_wrist_img
    joint_positions:
      key_type: proprio_keys
      lerobot_key: observations.state.joint_positions
    actions_joints:
      key_type: action_keys
      lerobot_key: actions_joints

  viz_img_key: front_img_1